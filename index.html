<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MapMetadataService 單頁呼叫（多重 fallback）</title>
  <style>
    body { font-family: Arial, "Noto Sans TC", sans-serif; padding:20px; max-width:900px; margin:auto; }
    input, button, select { font-size:14px; padding:6px 8px; margin-right:6px; }
    button { cursor:pointer; }
    pre { background:#f7f7f7; padding:12px; border-radius:6px; white-space:pre-wrap; word-break:break-word; }
    .muted { color:#666; font-size:13px; margin-top:6px; }
    .warn { color:#a33; font-weight:700; }
    label { display:inline-block; margin-bottom:8px; }
  </style>
</head>
<body>
  <h3>MapMetadataService 呼叫</h3>

  <div>
    <label>LotCode: <input id="lotcode" value="B010001" /></label>
    <label>Method:
      <select id="method"><option>GET</option><option>POST</option></select>
    </label>
  </div>

  <div style="margin-top:8px;">
    <button id="btnCall">呼叫（自動 fallback）</button>
    <button id="btnClear">清除</button>
  </div>

  <div style="margin-top:10px;">
    <label>自訂 Proxy（可留空）: <input id="customProxy" placeholder="例如 https://localhost:3000/proxy?url=" style="width:420px" /></label>
  </div>

  <p class="muted">若直接呼叫失敗，頁面會依序嘗試下列公開 proxy：AllOrigins、ThingProxy、CORSProxy.io。正式環境請自行部署後端 proxy。</p>

  <h4>回傳結果</h4>
  <pre id="result">尚未呼叫</pre>

  <script>
    const TARGET = 'http://lisp.land.moi.gov.tw/MMS/Handle/MapMetadataService.asmx/RequestService';
    const resultEl = document.getElementById('result');
    const proxies = [
      { name: 'AllOrigins', build: url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url), supportsPost:false },
      { name: 'ThingProxy', build: url => 'https://thingproxy.freeboard.io/fetch/' + url, supportsPost:false },
      { name: 'CORSProxyIO', build: url => 'https://corsproxy.io/?' + url, supportsPost:true }
    ];

    function show(text) { resultEl.textContent = text; }

    function prettyXml(xmlText) {
      try {
        const p = new DOMParser();
        const doc = p.parseFromString(xmlText, 'application/xml');
        if (doc.querySelector('parsererror')) return xmlText;
        const xs = new XMLSerializer();
        const raw = xs.serializeToString(doc);
        return raw.replace(/(>)(<)(\/*)/g, '$1\n$2$3').split('\n').map(l => l.trim()).join('\n');
      } catch (e) {
        return xmlText;
      }
    }

    async function fetchDirect(url, options) {
      const resp = await fetch(url, options);
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
      const text = await resp.text();
      return { text, via: 'direct', status: resp.status, contentType: resp.headers.get('content-type') || '' };
    }

    async function fetchViaProxy(proxy, targetUrl, options) {
      const proxyUrl = proxy.build(targetUrl);
      // If proxy doesn't support POST and user requested POST, skip
      if (options && options.method === 'POST' && !proxy.supportsPost) {
        throw new Error(proxy.name + ' 不支援 POST 轉發');
      }
      const resp = await fetch(proxyUrl, options && options.method ? options : { method: 'GET' });
      if (!resp.ok) throw new Error(proxy.name + ' 回傳 HTTP ' + resp.status);
      const text = await resp.text();
      return { text, via: proxy.name, status: resp.status, contentType: resp.headers.get('content-type') || '' };
    }

    async function callService(lotcode, method, customProxy) {
      const urlWithQuery = TARGET + '?LotCode=' + encodeURIComponent(lotcode);
      const body = 'LotCode=' + encodeURIComponent(lotcode);
      show('開始呼叫...\n目標: ' + TARGET + '\n方法: ' + method + '\n自訂 Proxy: ' + (customProxy || '(無)') + '\n\n嘗試直接連線...');
      // 1. 直接嘗試
      try {
        if (method === 'GET') {
          const r = await fetchDirect(urlWithQuery, { method: 'GET', headers: { 'Accept': 'application/xml, text/xml, */*' } });
          showResult(r);
          return;
        } else {
          const r = await fetchDirect(TARGET, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/xml, text/xml, */*' }, body });
          showResult(r);
          return;
        }
      } catch (err) {
        console.warn('Direct failed', err);
        show('直接呼叫失敗：' + err.message + '\n\n開始依序嘗試公開 proxy...');
      }

      // 2. 若有自訂 proxy，先嘗試自訂 proxy（假設自訂 proxy 接受完整 target URL 或已包含 ?url=）
      if (customProxy) {
        try {
          // If customProxy contains placeholder {url}, replace it; else append target as query param if it ends with '=' or contains '?'
          let proxyEndpoint = customProxy;
          if (proxyEndpoint.includes('{url}')) {
            proxyEndpoint = proxyEndpoint.replace('{url}', encodeURIComponent(method === 'GET' ? urlWithQuery : TARGET));
          } else if (proxyEndpoint.includes('=') || proxyEndpoint.endsWith('/')) {
            // assume user provided something like https://localhost:3000/proxy?url=
            proxyEndpoint = proxyEndpoint + encodeURIComponent(method === 'GET' ? urlWithQuery : TARGET);
          } else {
            // fallback: append as path
            proxyEndpoint = proxyEndpoint + encodeURIComponent(method === 'GET' ? urlWithQuery : TARGET);
          }

          const opts = method === 'GET' ? { method: 'GET' } : { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body };
          const resp = await fetch(proxyEndpoint, opts);
          if (!resp.ok) throw new Error('自訂 proxy 回傳 HTTP ' + resp.status);
          const text = await resp.text();
          showResult({ text, via: 'customProxy', status: resp.status, contentType: resp.headers.get('content-type') || '' });
          return;
        } catch (err) {
          console.warn('Custom proxy failed', err);
          show('自訂 proxy 失敗：' + err.message + '\n\n繼續嘗試公開 proxy...');
        }
      }

      // 3. 依序嘗試公開 proxy 列表
      for (const p of proxies) {
        try {
          const opts = method === 'GET' ? { method: 'GET' } : { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body };
          const targetForProxy = method === 'GET' ? urlWithQuery : TARGET;
          const r = await fetchViaProxy(p, targetForProxy, opts);
          showResult(r);
          return;
        } catch (err) {
          console.warn(p.name + ' failed', err);
          // continue to next proxy
        }
      }

      // 4. 全部失敗
      show('所有嘗試皆失敗。\n\n建議：在本機啟動簡單 proxy，然後把 proxy URL 貼到「自訂 Proxy」欄位再試一次。\n\n本機快速 proxy 範例（Node.js，一行啟動）：\n\n1) 安裝並啟動 cors-anywhere（臨時測試用）：\n   npx cors-anywhere\n   → 預設會在 http://localhost:8080/，使用方式： http://localhost:8080/' + TARGET + '?LotCode=B010001\n\n2) 或使用 local-cors-proxy：\n   npx local-cors-proxy --proxyUrl ' + TARGET + '\n\n把對應的 proxy endpoint 貼到「自訂 Proxy」欄位（例如 https://localhost:8080/ 或 http://localhost:8080/），再按呼叫。');
    }

    function showResult(r) {
      const header = `成功（via: ${r.via}）\nHTTP: ${r.status}\nContent-Type: ${r.contentType}\n\n`;
      const body = prettyXml(r.text);
      show(header + body);
    }

    document.getElementById('btnCall').addEventListener('click', () => {
      const code = document.getElementById('lotcode').value.trim() || 'B010001';
      const method = document.getElementById('method').value;
      const customProxy = document.getElementById('customProxy').value.trim();
      callService(code, method, customProxy);
    });

    document.getElementById('btnClear').addEventListener('click', () => show('尚未呼叫'));
  </script>
</body>
</html>
