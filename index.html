<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MapMetadataService 單頁呼叫範例（含自動 fallback proxy）</title>
  <style>
    body { font-family: Arial, "Noto Sans TC", sans-serif; padding: 20px; max-width:900px; margin:auto; }
    input, button { font-size: 14px; padding:6px 8px; }
    button { margin-right:8px; }
    pre { background:#f7f7f8; padding:12px; border-radius:6px; white-space:pre-wrap; word-break:break-word; }
    .meta { color:#666; font-size:13px; margin-bottom:12px; }
    .warn { color:#a33; font-weight:600; }
  </style>
</head>
<body>
  <h3>MapMetadataService 呼叫（單頁 HTML）</h3>
  <div class="meta">
    API: <code>http://lisp.land.moi.gov.tw/MMS/Handle/MapMetadataService.asmx/RequestService</code>
    。若直接呼叫失敗，頁面會自動嘗試公開 CORS proxy 作為 fallback。
  </div>

  <div>
    <label>LotCode: <input id="lotcode" value="B010001" /></label>
  </div>

  <div style="margin-top:10px;">
    <button id="btnGet">GET 呼叫（自動 fallback）</button>
    <button id="btnPost">POST 呼叫（自動 fallback）</button>
    <button id="btnClear">清除結果</button>
  </div>

  <h4>回傳結果</h4>
  <pre id="result">尚未呼叫</pre>

  <script>
    const TARGET = 'http://lisp.land.moi.gov.tw/MMS/Handle/MapMetadataService.asmx/RequestService';
    const resultEl = document.getElementById('result');

    function show(text) { resultEl.textContent = text; }

    // Helper: pretty-print XML if possible
    function prettyXml(xmlText) {
      try {
        const p = new DOMParser();
        const doc = p.parseFromString(xmlText, 'application/xml');
        if (doc.querySelector('parsererror')) return xmlText;
        const xs = new XMLSerializer();
        const raw = xs.serializeToString(doc);
        // simple formatting
        return raw.replace(/(>)(<)(\/*)/g, '$1\n$2$3').split('\n').map(l => l.trim()).join('\n');
      } catch (e) {
        return xmlText;
      }
    }

    // Primary fetch attempt (direct)
    async function tryDirectFetch(url, options) {
      const resp = await fetch(url, options);
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
      const text = await resp.text();
      return { text, via: 'direct', status: resp.status, contentType: resp.headers.get('content-type') || '' };
    }

    // Fallback GET via AllOrigins (GET only)
    async function fetchViaAllOriginsGet(targetUrl) {
      // AllOrigins raw endpoint
      const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
      const resp = await fetch(proxy, { method: 'GET' });
      if (!resp.ok) throw new Error('Proxy GET failed: ' + resp.status);
      const text = await resp.text();
      return { text, via: 'allorigins', status: resp.status, contentType: resp.headers.get('content-type') || '' };
    }

    // Fallback POST via corsproxy.io (supports forwarding POST)
    async function fetchViaCorsProxyPost(targetUrl, body, contentType='application/x-www-form-urlencoded') {
      // corsproxy.io forwards the request if you append the target URL as query
      // POST to: https://corsproxy.io/?<TARGET>
      const proxy = 'https://corsproxy.io/?' + targetUrl;
      const resp = await fetch(proxy, {
        method: 'POST',
        headers: { 'Content-Type': contentType },
        body: body
      });
      if (!resp.ok) throw new Error('Proxy POST failed: ' + resp.status);
      const text = await resp.text();
      return { text, via: 'corsproxy.io', status: resp.status, contentType: resp.headers.get('content-type') || '' };
    }

    // Unified GET with fallback
    async function callGetWithFallback(lotcode) {
      const url = TARGET + '?LotCode=' + encodeURIComponent(lotcode);
      show('嘗試直接 GET：\n' + url);
      try {
        const r = await tryDirectFetch(url, { method: 'GET', headers: { 'Accept': 'application/xml, text/xml, */*' } });
        show(`成功（${r.via}）\n\nContent-Type: ${r.contentType}\n\n` + prettyXml(r.text));
      } catch (err) {
        console.warn('Direct GET failed:', err);
        show('直接 GET 失敗：' + err.message + '\n\n嘗試使用公開 proxy（AllOrigins）...');
        try {
          const r2 = await fetchViaAllOriginsGet(url);
          show(`成功（${r2.via}）\n\nContent-Type: ${r2.contentType}\n\n` + prettyXml(r2.text));
        } catch (err2) {
          console.error('Proxy GET failed:', err2);
          show('Proxy GET 也失敗：' + err2.message + '\n\n請檢查網路、或改用本機/自建後端 proxy。');
        }
      }
    }

    // Unified POST with fallback
    async function callPostWithFallback(lotcode) {
      const body = 'LotCode=' + encodeURIComponent(lotcode);
      show('嘗試直接 POST：\n' + TARGET + '\n\nbody: ' + body);
      try {
        const r = await tryDirectFetch(TARGET, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/xml, text/xml, */*' },
          body: body
        });
        show(`成功（${r.via}）\n\nContent-Type: ${r.contentType}\n\n` + prettyXml(r.text));
      } catch (err) {
        console.warn('Direct POST failed:', err);
        show('直接 POST 失敗：' + err.message + '\n\n嘗試使用公開 proxy（corsproxy.io）...');
        try {
          const r2 = await fetchViaCorsProxyPost(TARGET, body, 'application/x-www-form-urlencoded');
          show(`成功（${r2.via}）\n\nContent-Type: ${r2.contentType}\n\n` + prettyXml(r2.text));
        } catch (err2) {
          console.error('Proxy POST failed:', err2);
          show('Proxy POST 也失敗：' + err2.message + '\n\n請檢查網路、或改用本機/自建後端 proxy。');
        }
      }
    }

    document.getElementById('btnGet').addEventListener('click', () => {
      const code = document.getElementById('lotcode').value.trim() || 'B010001';
      callGetWithFallback(code);
    });

    document.getElementById('btnPost').addEventListener('click', () => {
      const code = document.getElementById('lotcode').value.trim() || 'B010001';
      callPostWithFallback(code);
    });

    document.getElementById('btnClear').addEventListener('click', () => show('尚未呼叫'));

    // 自動測試（可註解掉）
    // window.addEventListener('load', () => { /* callGetWithFallback('B010001'); */ });
  </script>
</body>
</html>
